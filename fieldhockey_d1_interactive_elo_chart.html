<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>D1 Field Hockey Elo Explorer</title>
  <style>
    :root {
      --bg: #000000;
      --ink: #f2f2f2;
      --muted: #9b9b9b;
      --grid: #343434;
      --context: #4f6670;
      --pink: #f3a6c9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Anka/Coder", "Anka Coder", "Courier New", Courier, monospace;
      color: var(--ink);
      background: var(--bg);
    }
    .fh-elo-widget {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 48px 28px 20px;
      background: var(--bg);
    }
    .fh-elo-topbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      align-items: center;
      justify-items: center;
      padding-bottom: 18px;
    }
    .fh-elo-title {
      margin: 0;
      max-width: 920px;
      font-family: "Anka/Coder", "Anka Coder", "Courier New", Courier, monospace;
      font-size: clamp(27px, 4.5vw, 48px);
      line-height: 1.22;
      letter-spacing: 0;
      font-weight: 700;
      text-align: center;
      text-wrap: balance;
    }
    .fh-elo-title .pink { color: var(--pink); }
    .fh-elo-subtitle {
      max-width: 760px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: clamp(13px, 1.4vw, 16px);
      line-height: 1.55;
      text-align: center;
    }
    .fh-elo-control {
      width: min(420px, 100%);
    }
    .fh-elo-control label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--muted);
      text-align: center;
    }
    .fh-elo-select {
      width: 100%;
      height: 44px;
      border: 1px solid #565656;
      border-radius: 0;
      background: #050505;
      color: var(--ink);
      padding: 0 12px;
      font: inherit;
      font-weight: 700;
      text-align: center;
    }
    .fh-elo-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      max-width: 760px;
      margin: 0 auto 20px;
    }
    .fh-elo-stat {
      padding: 0;
      min-height: 42px;
      text-align: center;
    }
    .fh-elo-stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .fh-elo-stat strong {
      display: block;
      margin-top: 4px;
      font-family: "Anka/Coder", "Anka Coder", "Courier New", Courier, monospace;
      font-size: clamp(18px, 2.4vw, 25px);
      line-height: 1.1;
      color: var(--pink);
    }
    .fh-elo-chart-wrap {
      position: relative;
      width: 100%;
      height: clamp(450px, 60vw, 660px);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .fh-elo-footnote {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      text-align: right;
      font-style: italic;
    }
    @media (max-width: 720px) {
      .fh-elo-widget { padding: 28px 12px 12px; }
      .fh-elo-topbar { grid-template-columns: 1fr; align-items: stretch; }
      .fh-elo-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .fh-elo-chart-wrap { height: 460px; }
    }
  </style>
</head>
<body>
  <section class="fh-elo-widget" aria-label="D1 field hockey Elo explorer">
    <div class="fh-elo-topbar">
      <div>
        <h1 class="fh-elo-title">Explore every <span class="pink">D1 field hockey Elo path</span><br>since 2006</h1>
        <p class="fh-elo-subtitle">Select a team to highlight its rating history. All other programs stay in the background.</p>
      </div>
      <div class="fh-elo-control">
        <label for="teamSelect">Team</label>
        <select id="teamSelect" class="fh-elo-select"></select>
      </div>
    </div>
    <div class="fh-elo-stats">

      <div class="fh-elo-stat"><span>Current Rank</span><strong id="currentRank">-</strong></div>
      <div class="fh-elo-stat"><span>Peak Elo</span><strong id="peakElo">-</strong></div>
      <div class="fh-elo-stat"><span>Data Span</span><strong id="dataSpan">-</strong></div>
    </div>
    <div class="fh-elo-chart-wrap">
      <canvas id="eloCanvas"></canvas>
    </div>
    <p class="fh-elo-footnote">Model: scale 400, K 80, offseason retention 0.75, margin cap 2.25 / Data collected from FieldHockeyCorner</p>

    const statSpan = document.getElementById("dataSpan");

    const teams = Object.keys(data.series);
    const ratingsByTeam = new Map(data.ratings.map((r, i) => [r.team, { ...r, rank: i + 1 }]));
    const dateToTime = value => {
      const [y, m, d] = value.split("-").map(Number);
      return Date.UTC(y, m - 1, d);
    };
    const allPoints = [];
    for (const team of teams) {
      for (const point of data.series[team]) {
        allPoints.push([dateToTime(point[0]), point[1]]);
      }
    }
    const minX = Math.min(...allPoints.map(p => p[0]));
    const maxX = Math.max(...allPoints.map(p => p[0]));
    const minElo = Math.floor(Math.min(...allPoints.map(p => p[1])) / 100) * 100;
    const maxElo = Math.ceil(Math.max(...allPoints.map(p => p[1])) / 100) * 100;

    const alphabeticTeams = [...teams].sort((a, b) => a.localeCompare(b));
    for (const team of alphabeticTeams) {
      const option = document.createElement("option");
      option.value = team;
      option.textContent = team;
      select.appendChild(option);
    }
    select.value = data.defaultTeam;

    const colors = {
      bg: "#000000",
      ink: "#f2f2f2",
      muted: "#9b9b9b",
      grid: "#343434",
      context: "rgba(79, 102, 112, 0.34)",
      contextSoft: "rgba(79, 102, 112, 0.20)",
      pink: "#f3a6c9"
    };
    const fontStack = '"Anka/Coder", "Anka Coder", "Courier New", Courier, monospace';
    function fmtYear(time) {
      return new Date(time).getUTCFullYear();
    }
    function draw() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const w = rect.width;
      const h = rect.height;
      const margin = {
        left: w < 620 ? 52 : 68,
        right: w < 620 ? 18 : 34,
        top: 28,
        bottom: 54
      };
      const plotW = w - margin.left - margin.right;
      const plotH = h - margin.top - margin.bottom;
      const x = t => margin.left + ((t - minX) / (maxX - minX)) * plotW;
      const y = elo => margin.top + (1 - ((elo - minElo) / (maxElo - minElo))) * plotH;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = colors.bg;
      ctx.fillRect(0, 0, w, h);

      ctx.lineWidth = 1;
      ctx.strokeStyle = colors.grid;
      ctx.fillStyle = colors.muted;
      ctx.font = `700 12px ${fontStack}`;
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let elo = minElo; elo <= maxElo; elo += 100) {
        const yy = y(elo);
        ctx.beginPath();
        ctx.moveTo(margin.left, yy);
        ctx.lineTo(w - margin.right, yy);
        ctx.stroke();
        ctx.fillText(String(elo), margin.left - 8, yy);
      }

      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      const minYear = fmtYear(minX);
      const maxYear = fmtYear(maxX);
      for (let year = minYear; year <= maxYear; year += 2) {
        const xx = x(Date.UTC(year, 0, 1));
        ctx.strokeStyle = colors.grid;
        ctx.beginPath();
        ctx.moveTo(xx, margin.top);
        ctx.lineTo(xx, h - margin.bottom);
        ctx.stroke();
        ctx.fillStyle = colors.muted;
        ctx.fillText(String(year), xx, h - margin.bottom + 12);
      }

      ctx.strokeStyle = "#5a5a5a";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(margin.left, h - margin.bottom);
      ctx.lineTo(w - margin.right, h - margin.bottom);
      ctx.moveTo(margin.left, margin.top);
      ctx.lineTo(margin.left, h - margin.bottom);
      ctx.stroke();

      const selected = select.value;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      for (const team of teams) {
        if (team === selected) continue;
        drawLine(team, colors.contextSoft, 1.05, x, y);
      }
      drawLine(selected, colors.pink, w < 620 ? 3.2 : 4.2, x, y);

      const selectedPoints = data.series[selected];
      const last = selectedPoints[selectedPoints.length - 1];
      const px = x(dateToTime(last[0]));
      const py = y(last[1]);
      ctx.fillStyle = colors.pink;
      ctx.beginPath();
      ctx.arc(px, py, 5.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = colors.ink;
      ctx.font = `700 14px ${fontStack}`;
      ctx.textAlign = px > w - 190 ? "right" : "left";
      ctx.textBaseline = "middle";
      const labelX = px + (px > w - 190 ? -12 : 12);
      const labelText = `${selected} ${Math.round(last[1])}`;
      ctx.fillText(labelText, labelX, py);
      updateStats(selected);
    }
    function drawLine(team, stroke, width, x, y) {
      const points = data.series[team];
      if (!points || points.length < 2) return;
      ctx.beginPath();
      points.forEach((point, i) => {
        const xx = x(dateToTime(point[0]));
        const yy = y(point[1]);
        if (i === 0) ctx.moveTo(xx, yy);
        else ctx.lineTo(xx, yy);
      });
      ctx.strokeStyle = stroke;
      ctx.lineWidth = width;
      ctx.stroke();
    }
    function updateStats(team) {
      const row = ratingsByTeam.get(team);
      const points = data.series[team];
      const peak = Math.max(...points.map(p => p[1]));
      statCurrent.textContent = Math.round(row.current).toLocaleString();
      statRank.textContent = `#${row.rank}`;
      statPeak.textContent = Math.round(peak).toLocaleString();
      statSpan.textContent = `${points[0][0].slice(0, 4)}-${points[points.length - 1][0].slice(0, 4)}`;
    }
    select.addEventListener("change", draw);
    window.addEventListener("resize", draw);
    draw();
  })();
  </script>
</body>
</html>
